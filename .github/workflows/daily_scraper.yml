name: Daily Gujarati News Scraper

on:
  schedule:
    # This cron schedule runs the action at 00:00 UTC every day.
    - cron: '0 0 * * *'
  # This allows you to manually trigger the workflow from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installing required packages for web crawling and Hugging Face integration
          pip install requests beautifulsoup4 datasets huggingface_hub trafilatura

      - name: Run Web Crawler
        run: |
          python main.py

      - name: Upload to Hugging Face Hub
        env:
          # Pulls the token from your GitHub repository secrets
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python upload_to_hf.py